---
- name: Install and start Apache HTTPD
  hosts: all
  gather_facts: false
  become: yes

  tasks:
    - name: Install httpd package
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Start and enable httpd service
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: yes
